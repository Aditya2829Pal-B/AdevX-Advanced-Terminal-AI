name: AdevX CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile check
        run: |
          python -m py_compile taskbot.py
          python - << 'PY'
          import pathlib, py_compile
          for p in pathlib.Path("adevx").rglob("*.py"):
              py_compile.compile(str(p), doraise=True)
          print("compile ok")
          PY

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

